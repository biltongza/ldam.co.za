<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin="anonymous" />
    <link rel="dns-prefetch" href="https://cdn.jsdelivr.net" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <link rel="icon" sizes="16x16 32x32 64x64" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="196x196" href="/favicon-192.png" />
    <link rel="icon" type="image/png" sizes="160x160" href="/favicon-160.png" />
    <link rel="icon" type="image/png" sizes="96x96" href="/favicon-96.png" />
    <link rel="icon" type="image/png" sizes="64x64" href="/favicon-64.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
    <link rel="apple-touch-icon" href="/favicon-57.png" />
    <link rel="apple-touch-icon" sizes="114x114" href="/favicon-114.png" />
    <link rel="apple-touch-icon" sizes="72x72" href="/favicon-72.png" />
    <link rel="apple-touch-icon" sizes="144x144" href="/favicon-144.png" />
    <link rel="apple-touch-icon" sizes="60x60" href="/favicon-60.png" />
    <link rel="apple-touch-icon" sizes="120x120" href="/favicon-120.png" />
    <link rel="apple-touch-icon" sizes="76x76" href="/favicon-76.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/favicon-152.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/favicon-180.png" />
    <link
      rel="alternate"
      type="application/rss+xml"
      title="Logan Dam's blog on technology and life"
      href="https://ldam.co.za/rss.xml"
    />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <meta name="description" content="Logan Dam's portfolio of photography and code." />
    <meta name="author" content="Logan Dam" />
    <meta property="twitter:site" content="@thebiltong" />
    <meta property="twitter:creator" content="@thebiltong" />
    <meta property="twitter:card" content="summary" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/styles/vs.min.css"
    />
    <link href="https://cdn.jsdelivr.net/npm/normalize.css@8.0.1/normalize.css" rel="stylesheet" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@shoelace-style/shoelace@2.20.1/cdn/themes/light.css"
    />

    <link href="/app.css" rel="stylesheet" />
    <script>
      window.addEventListener('sveltekit:navigation-start', (event) => {
        if (window.appInsights) {
          window.appInsights.startTrackPage(window.location.href);
        }
      });
      window.addEventListener('sveltekit:navigation-end', (event) => {
        if (window.appInsights) {
          window.appInsights.stopTrackPage(window.location.href);
        }
      });
    </script>
    <script
      type="module"
      src="https://cdn.jsdelivr.net/npm/@shoelace-style/shoelace@2.20.1/cdn/shoelace-autoloader.js"
    ></script>
    <script type="module">
      import { registerIconLibrary } from 'https://cdn.jsdelivr.net/npm/@shoelace-style/shoelace@2.20.1/cdn/utilities/icon-library.js';

      registerIconLibrary('ionicons', {
        resolver: (name) =>
          `https://cdn.jsdelivr.net/npm/ionicons@5.1.2/dist/ionicons/svg/${name}.svg`,
        mutator: (svg) => {
          svg.setAttribute('fill', 'currentColor');
          svg.setAttribute('stroke', 'currentColor');
          [...svg.querySelectorAll('.ionicon-fill-none')].map((el) =>
            el.setAttribute('fill', 'none')
          );
          [...svg.querySelectorAll('.ionicon-stroke-width')].map((el) =>
            el.setAttribute('stroke-width', '32px')
          );
        }
      });
    </script>
    %sveltekit.head%
  </head>

  <body>
    <div id="svelte">%sveltekit.body%</div>
  </body>
</html>
